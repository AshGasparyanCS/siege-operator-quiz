<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Siege Operator Quiz — Guess the Operator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">
      <h1>Guess the Operator</h1>
      <p class="subtitle">Rainbow Six Siege — name every operator from their icon.</p>
    </div>
    <div class="controls">
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <button id="submitBtn" type="button" disabled>Submit</button>
      <button id="resetBtn" type="button" class="ghost">Clear</button>
      <button id="againBtn" type="button" class="hidden">Play again</button>
    </div>
  </header>

  <main>
    <section id="bankSection" aria-label="Word bank">
      <h2 class="section-label">Word bank <span class="hint">click a name, then click an icon — or use each icon's dropdown</span></h2>
      <div id="bank" class="bank"></div>
    </section>

    <section aria-label="Operator grid">
      <div id="grid" class="grid"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="result" class="result"></span>
  </footer>

  <!-- Manifest is generated by gen_manifest.py; defines window.OPERATORS -->
  <script src="manifest.js"></script>
  <script src="game.js"></script>
</body>
</html>
